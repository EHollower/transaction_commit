name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download TLC
        run: |
          mkdir -p tools
          curl -L -o tools/tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar

      - name: Verify correct TLA+ model
        run: |
          java -XX:+UseParallelGC -cp tools/tla2tools.jar tlc2.TLC -config tla/TwoPhase.cfg tla/TwoPhase.tla

      - name: Verify buggy TLA+ model fails as expected
        run: |
          set +e
          java -XX:+UseParallelGC -cp tools/tla2tools.jar tlc2.TLC -config tla/TwoPhaseBuggy.cfg tla/TwoPhaseBuggy.tla > /tmp/tlc_buggy.log 2>&1
          cat /tmp/tlc_buggy.log
          if ! grep -q "Invariant TPConsistent is violated" /tmp/tlc_buggy.log; then
            echo "Expected TLA+ invariant violation was not found."
            exit 1
          fi

      - name: Run Java JUnit tests
        run: mvn test

      - name: Verify correct Go implementation commits
        run: |
          go run go/TwoPhase.go --rm=0,0,0 > /tmp/go_correct_commit.log
          cat /tmp/go_correct_commit.log
          grep -q "TM = committed" /tmp/go_correct_commit.log
          grep -q "rm1 = committed" /tmp/go_correct_commit.log
          grep -q "rm2 = committed" /tmp/go_correct_commit.log
          grep -q "rm3 = committed" /tmp/go_correct_commit.log

      - name: Verify correct Go implementation aborts
        run: |
          go run go/TwoPhase.go --rm=0,0,1 > /tmp/go_correct_abort.log
          cat /tmp/go_correct_abort.log
          grep -q "TM = aborted" /tmp/go_correct_abort.log
          grep -q "rm1 = aborted" /tmp/go_correct_abort.log
          grep -q "rm2 = aborted" /tmp/go_correct_abort.log
          grep -q "rm3 = aborted" /tmp/go_correct_abort.log

      - name: Verify buggy Go unbuffered version deadlocks
        run: |
          set +e
          timeout 10s go run go/TwoPhaseAlgorithmLogicBug.go --rm=0,0,1 > /tmp/go_bug_unbuffered.log 2>&1
          status=$?
          cat /tmp/go_bug_unbuffered.log
          if [ "$status" -eq 0 ]; then
            echo "Buggy unbuffered Go implementation unexpectedly completed."
            exit 1
          fi
          grep -Eq "deadlock|timed out|all goroutines are asleep" /tmp/go_bug_unbuffered.log

      - name: Verify buggy Go buffered version is inconsistent
        run: |
          go run go/TwoPhaseAlgorithmLogicBug.go --rm=0,0,1 --bufferedChannel > /tmp/go_bug_buffered.log
          cat /tmp/go_bug_buffered.log
          grep -q "TM = committed" /tmp/go_bug_buffered.log
          grep -q "committed" /tmp/go_bug_buffered.log
          grep -q "aborted" /tmp/go_bug_buffered.log

      - name: Run Go race detector on buffered buggy version
        run: |
          go run -race go/TwoPhaseAlgorithmLogicBug.go --rm=0,0,1 --bufferedChannel > /tmp/go_race_buffered.log
          cat /tmp/go_race_buffered.log
          grep -q "TM = committed" /tmp/go_race_buffered.log

      - name: Set up Java 11 for JavaPathFinder
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build JavaPathFinder
        run: |
          git clone https://github.com/javapathfinder/jpf-core.git tools/jpf-core
          git -C tools/jpf-core checkout 2bf98722c49a8149f9a6f68acb9edc6ba5cdd557
          bash tools/jpf-core/gradlew -p tools/jpf-core buildJars
          mkdir -p ~/.jpf
          cat > ~/.jpf/site.properties <<EOF
          jpf-core = $GITHUB_WORKSPACE/tools/jpf-core
          extensions = \${jpf-core}
          EOF

      - name: Compile JavaPathFinder models
        run: |
          mkdir -p java/tests/JavaPathFinder/build
          javac --release 11 -cp tools/jpf-core/build/jpf.jar -d java/tests/JavaPathFinder/build java/tests/JavaPathFinder/CorrectTwoPhaseJpf.java java/tests/JavaPathFinder/BuggyTwoPhaseJpf.java

      - name: Verify correct JavaPathFinder model
        run: |
          tools/jpf-core/bin/jpf java/tests/JavaPathFinder/correct_two_phase.jpf

      - name: Verify buggy JavaPathFinder model fails as expected
        run: |
          set +e
          tools/jpf-core/bin/jpf java/tests/JavaPathFinder/buggy_two_phase.jpf > /tmp/jpf_buggy.log 2>&1
          cat /tmp/jpf_buggy.log
          if ! grep -q "AssertionError" /tmp/jpf_buggy.log; then
            echo "Expected JavaPathFinder assertion error was not found."
            exit 1
          fi
